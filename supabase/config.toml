# =============================================================================
# Supabase CLI — Configuração local
# Docs: https://supabase.com/docs/guides/cli/config
# =============================================================================

project_id = "supabase-multitenant-starter"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

# =============================================================================
# Autenticação
# =============================================================================
[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://localhost:3000"]

# Tempo de vida do JWT (1h = 3600s é o padrão e o recomendado).
# Tokens curtos + refresh longo = mais seguro contra vazamento.
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

# Política de senha forte (NIST 800-63B compliant).
# `password_requirements` aceita: letters_digits | lower_upper_letters_digits | lower_upper_letters_digits_symbols
minimum_password_length = 12
password_requirements = "lower_upper_letters_digits_symbols"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true  # CRÍTICO: exige verificação de email antes do login
secure_password_change = true
max_frequency = "1m0s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
enable_signup = false
enable_confirmations = false

# OAuth — habilite os que precisar
[auth.external.google]
enabled = false
client_id = ""
secret = ""

[auth.external.github]
enabled = false
client_id = ""
secret = ""

# =============================================================================
# Auth Hook — injeta company_id e role no JWT
# =============================================================================
[auth.hook.custom_access_token]
enabled = true
uri = "pg-functions://postgres/public/custom_access_token_hook"

# =============================================================================
# Edge Functions
# =============================================================================
[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

[functions.invitations]
verify_jwt = true
